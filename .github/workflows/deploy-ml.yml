name: Deploy ML Pipeline

on:
  push:
    branches: [main]
    paths:
      - "ml/**"
      - "shared/**"
      - "infra/app.py"
      - "infra/stacks/ml_stack.py"
      - ".github/workflows/deploy-ml.yml"
  workflow_dispatch:

concurrency:
  group: cdk-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Validate imports
        run: python -c "from ml.config import XGBOOST_PARAM_SETS, ALL_NUMERIC_FEATURES; print(f'{len(ALL_NUMERIC_FEATURES)} features configured')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        run: pip install -r infra/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: CDK deploy ML stack
        working-directory: infra
        run: cdk deploy BasesLoadedMl --require-approval never
